<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLAME HEART FILE</title>

<style>
body {
  background: black;
  color: #00ff66;
  font-family: monospace;
  padding: 20px;
  margin: 0;
}

#terminal {
  white-space: pre-line;
  max-width: 800px;
  margin: 0 auto;
  font-size: 14px;
}

input {
  background: black;
  border: none;
  border-bottom: 1px solid #00ff66;
  color: #00ff66;
  font-family: monospace;
  font-size: 16px;
  outline: none;
  margin-top: 10px;
  width: 100%;
  max-width: 400px;
}

button {
  margin-top: 10px;
  background: black;
  border: 1px solid #00ff66;
  color: #00ff66;
  font-family: monospace;
  cursor: pointer;
  padding: 6px;
  width: 100%;
  max-width: 200px;
  display: block;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>

const lines = [
  "INITIALIZING CHEAP SHOT PROTOCOL...",
  "LOADING FILE: FLAME HEART CASE",
  "CONNECTING TO ARCHIVE...",
  "ACCESS GRANTED",
  "",
  "NOTE: SIGNAL DETECTED IN DESERT REGION",
  "WARNING: OBSERVATION PRESENCE CONFIRMED",
  "",
  "OPENING REPORT..."
];

let i = 0;
let j = 0;

let dotState = 0;
let loadingDotsInterval;

function startLoadingDots() {
  const t = document.getElementById("terminal");

  const dotLine = document.createElement("div");
  dotLine.id = "loadingDots";
  t.appendChild(dotLine);

  loadingDotsInterval = setInterval(() => {
    dotState = (dotState + 1) % 4;
    dotLine.innerHTML = "LOADING" + ".".repeat(dotState);
  }, 400);
}

function stopLoadingDots() {
  clearInterval(loadingDotsInterval);
}

function typeLines() {
  const t = document.getElementById("terminal");

  if (i < lines.length) {
    if (j < lines[i].length) {
      t.innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLines, 20);
    } else {
      t.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLines, 90);
    }
  } else {
    startLoadingDots();

    setTimeout(() => {
      stopLoadingDots();
      showPasswordScreen();
    }, 5000);
  }
}

function showPasswordScreen() {
  const t = document.getElementById("terminal");
  t.innerHTML = "";

  const hintText = document.createElement("div");
  hintText.innerHTML =
    "Bojkxk kyz bojkxo, kz wauj kd otboyu yvkizgz taswags uhroboyiozax barzas waks joyioz. Waoj yas kmu?";
  t.appendChild(hintText);

  const input = document.createElement("input");
  t.appendChild(input);

  const btn = document.createElement("button");
  btn.innerHTML = "submit";
  t.appendChild(btn);

  const hintBtn = document.createElement("button");
  hintBtn.innerHTML = "hint?";
  t.appendChild(hintBtn);

  btn.onclick = () => checkPassword(input.value.trim(), t, input);
  hintBtn.onclick = () => showHint(hintBtn, t);

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      checkPassword(input.value.trim(), t, input);
    }
  });
}

function checkPassword(val, t, input) {
  const old = document.getElementById("error");
  if (old) old.remove();

  if (val === "monkey" || val === "Monkey") {
    showSecondPrompt();
  } else {
    const error = document.createElement("div");
    error.id = "error";
    error.innerHTML = "ACCESS DENIED. RETRY.";
    error.style.color = "red";
    t.appendChild(error);
  }

  input.value = "";
}

function showHint(btn, t) {
  btn.remove();

  const text = "The man who made Rome great, a>g";

  let k = 0;
  const line = document.createElement("div");

  t.appendChild(document.createElement("br"));
  t.appendChild(line);

  function typeHint() {
    if (k < text.length) {
      line.innerHTML += text[k];
      k++;
      setTimeout(typeHint, 20);
    }
  }

  typeHint();
}

function showSecondPrompt() {
  const t = document.getElementById("terminal");

  t.innerHTML = "";

  const text = "ACCESS GRANTED";

  let pos = 0;

  function typeAccess() {
    if (pos < text.length) {
      t.innerHTML += text.charAt(pos);
      pos++;
      setTimeout(typeAccess, 60);
    } else {
      setTimeout(startBlinking, 600);
    }
  }

  function startBlinking() {
    let blinkCount = 0;

    const blinkInterval = setInterval(() => {

      if (t.style.visibility === "hidden") {
        t.style.visibility = "visible";
      } else {
        t.style.visibility = "hidden";
      }

      blinkCount++;

      if (blinkCount >= 8) {
        clearInterval(blinkInterval);

        t.style.visibility = "visible";

        setTimeout(() => {
          window.location.href = "terminal.html";
        }, 1500);
      }

    }, 250);
  }

  typeAccess();
}

typeLines();

</script>

</body>
</html>
