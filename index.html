<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLAME HEART FILE</title>

<style>
body {
  background: black;
  color: #00ff66;
  font-family: monospace;
  padding: 20px;
}

#terminal {
  white-space: pre-line;
}

input {
  background: black;
  border: none;
  border-bottom: 1px solid #00ff66;
  color: #00ff66;
  font-family: monospace;
  font-size: 14px;
  outline: none;
  margin-top: 5px;
  display: block;
}

button {
  margin-top: 10px;
  background: black;
  border: 1px solid #00ff66;
  color: #00ff66;
  font-family: monospace;
  cursor: pointer;
  padding: 5px;
}

</style>
</head>

<body>

<div id="terminal"></div>

<script>

const lines = [
  "INITIALIZING CHEAP SHOT PROTOCOL...",
  "LOADING FILE: FLAME HEART CASE",
  "CONNECTING TO ARCHIVE...",
  "ACCESS GRANTED",
  "",
  "NOTE: SIGNAL DETECTED IN DESERT REGION",
  "WARNING: OBSERVATION PRESENCE CONFIRMED",
  "",
  "OPENING REPORT..."
];

let i = 0;
let j = 0;

function typeLines() {
  const t = document.getElementById("terminal");

  if (i < lines.length) {
    if (j < lines[i].length) {
      t.innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLines, 20);
    } else {
      t.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLines, 100);
    }
  } else {
    setTimeout(showPasswordScreen, 1300); // cooldown
  }
}

function showPasswordScreen() {
  const t = document.getElementById("terminal");
  t.innerHTML = "";

  // 🔥 hint text ABOVE input (as requested)
  const hintText = document.createElement("div");
  hintText.innerHTML =
    "Bojkxk kyz bojkxo, kz wauj kd otboyu yvkizgz taswags uhroboyiozax barzas waks joyioz. Waoj yas kmu?";
  t.appendChild(hintText);

  const input = document.createElement("input");
  t.appendChild(input);

  const btn = document.createElement("button");
  btn.innerHTML = "submit";
  t.appendChild(btn);

  btn.onclick = () => checkPassword(input.value.trim(), t, input);
}

function checkPassword(val, t, input) {
  const oldError = document.getElementById("error");
  if (oldError) oldError.remove();

  if (val === "monkey" || val === "Monkey") {
    showSecondPrompt();
  } else {
    const error = document.createElement("div");
    error.id = "error";
    error.innerHTML = "ACCESS DENIED. RETRY.";
    error.style.color = "red";
    t.appendChild(error);
  }

  input.value = "";
}

function showSecondPrompt() {
  const t = document.getElementById("terminal");
  t.innerHTML = "";

  const q = document.createElement("div");
  q.innerHTML = "> what do you seek?";
  t.appendChild(q);

  const input = document.createElement("input");
  t.appendChild(input);

  const btn = document.createElement("button");
  btn.innerHTML = "submit";
  t.appendChild(btn);

  btn.onclick = () => {
    t.innerHTML = "> RESPONSE LOGGED\n\n[placeholder]";
  };
}

typeLines();

</script>

</body>
</html>
