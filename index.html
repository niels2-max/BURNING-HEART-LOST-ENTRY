<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CASE FILE</title>

<style>
body {
  background: black;
  color: #00ff66;
  font-family: monospace;
  padding: 20px;
}

#terminal {
  white-space: pre-line;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff66;
  margin-left: 4px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

input {
  background: black;
  border: none;
  border-bottom: 1px solid #00ff66;
  color: #00ff66;
  font-family: monospace;
  font-size: 14px;
  outline: none;
}
</style>
</head>

<body>

<div id="terminal"></div>

<script>
const lines = [
  "INITIALIZING CHEAP SHOT PROTOCOL...",
  "LOADING FILE: FLAME HEART CASE",
  "CONNECTING TO ARCHIVE...",
  "ACCESS GRANTED",
  "",
  "NOTE: SIGNAL DETECTED IN DESERT REGION",
  "WARNING: OBSERVATION PRESENCE CONFIRMED",
  "",
  "OPENING REPORT..."
];

let i = 0;
let j = 0;

function typeLines() {
  if (i < lines.length) {
    if (j < lines[i].length) {
      document.getElementById("terminal").innerHTML += lines[i].charAt(j);
      j++;
      setTimeout(typeLines, 25);
    } else {
      document.getElementById("terminal").innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLines, 120);
    }
  } else {
    setTimeout(showPasswordScreen, 500);
  }
}

function showPasswordScreen() {
  const terminal = document.getElementById("terminal");

  // clear screen
  terminal.innerHTML = "";

  const text = document.createElement("div");
  text.innerHTML = "> ENTER PASSWORD";
  terminal.appendChild(text);

  const input = document.createElement("input");
  input.type = "text";
  input.autofocus = true;

  terminal.appendChild(input);

  const cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.innerHTML = " ";
  terminal.appendChild(cursor);

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      checkPassword(input.value.trim());
    }
  });
}

function checkPassword(value) {
  const terminal = document.getElementById("terminal");

  terminal.innerHTML = "";

  if (value === "YOUR_PASSWORD_HERE") {
    terminal.innerHTML = "> ACCESS GRANTED\n\nLOADING FILE CONTENT...\n\n[REDACTED DATA STREAM]";
  } else {
    terminal.innerHTML = "> ACCESS DENIED\n\nOBSERVATION LOG UPDATED";
  }
}

typeLines();
</script>

</body>
</html>
