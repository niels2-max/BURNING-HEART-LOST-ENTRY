<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CASE FILE TERMINAL</title>

<style>

body{
    background:#000;
    color:#00ff66;
    font-family:monospace;
    margin:0;
    padding:20px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

#terminal{
    width:900px;
    max-width:100%;
    border:1px solid #00ff66;
    padding:30px;
    box-sizing:border-box;
    box-shadow:
        0 0 10px #00ff66,
        inset 0 0 10px rgba(0,255,102,0.2);
}

.header-container{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.logo{
    width:80px;
    height:80px;
    object-fit:contain;
    filter:
        drop-shadow(0 0 4px #00ff66)
        brightness(1.1);
}

.header{
    text-align:center;
}

.header h1{
    margin:0;
    font-size:26px;
    letter-spacing:3px;
    font-weight:normal;
}

.header h2{
    margin-top:8px;
    font-size:14px;
    font-weight:normal;
    opacity:0.8;
}

.divider{
    margin:25px 0;
    border-top:1px solid #00ff66;
}

.section-title{
    font-size:18px;
    margin-bottom:20px;
}

.prompt{
    margin-bottom:15px;
}

.input-line{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    font-size:16px;
    cursor:text;
}

.prompt-arrow{
    margin-right:10px;
}

#typedText{
    white-space:pre-wrap;
    word-break:break-word;
}

#cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

#realInput{
    position:absolute;
    left:-9999px;
    opacity:0;
}

button{
    margin-top:20px;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    font-family:monospace;
    padding:10px 16px;
    cursor:pointer;
}

button:hover{
    background:#001100;
}

#result{
    margin-top:20px;
    color:#00ff66;
}

.scanline{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.02),
            rgba(255,255,255,0.02) 1px,
            transparent 1px,
            transparent 4px
        );
}

@media(max-width:700px){

    #terminal{
        padding:20px;
    }

    .header-container{
        flex-direction:column;
        text-align:center;
    }

    .logo{
        width:70px;
        height:70px;
    }

    .header h1{
        font-size:18px;
    }

    .header h2{
        font-size:12px;
    }

}

</style>
</head>
<body>

<div id="terminal">

    <div class="header-container">

        <img src="logo.png" class="logo" alt="Logo">

        <div class="header">
            <h1>SPECIAL INVESTIGATIONS UNIT</h1>
            <h2>CASE FILE TERMINAL</h2>
        </div>

    </div>

    <div class="divider"></div>

    <div class="section-title">
        RECOVERED NOTES
    </div>

    <div class="prompt">
        Enter a name, place, or symbol.
    </div>

    <div class="input-line" onclick="focusInput()">
        <span class="prompt-arrow">></span>
        <span id="typedText"></span><span id="cursor">█</span>
    </div>

    <input
        id="realInput"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
    >

    <button onclick="searchFile()">SUBMIT</button>

    <div id="result"></div>

</div>

<div class="scanline"></div>

<script>

const typedText = document.getElementById("typedText");
const result = document.getElementById("result");
const realInput = document.getElementById("realInput");

function focusInput(){
    realInput.focus();
}

realInput.addEventListener("input", function(){
    typedText.textContent = realInput.value;
});

realInput.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        e.preventDefault();
        searchFile();
    }

});

function searchFile(){

    const query = realInput.value.trim().toLowerCase();

    const validFiles = [
        "henk",
        "skeleton",
        "monkey",
        "desert",
        "mupp",
        "meazy"
    ];

    if(validFiles.includes(query)){

        window.location.href = `files/${query}.html`;
        return;

    }

    result.textContent = "FILE NOT FOUND";

    realInput.value = "";
    typedText.textContent = "";

    focusInput();
}

focusInput();

</script>

</body>
</html>
