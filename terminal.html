<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CASE FILE TERMINAL</title>

<style>

body{
    background:#000;
    color:#00ff66;
    font-family:monospace;
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#terminal{
    width:900px;
    max-width:90%;
    border:1px solid #00ff66;
    padding:30px;
    box-shadow:
        0 0 10px #00ff66,
        inset 0 0 10px rgba(0,255,102,0.2);
}

.header-container{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.logo{
    width:80px;
    height:80px;
    object-fit:contain;
    filter:
        drop-shadow(0 0 4px #00ff66)
        brightness(1.1);
}

.header{
    text-align:center;
}

.header h1{
    margin:0;
    font-size:26px;
    letter-spacing:3px;
    font-weight:normal;
}

.header h2{
    margin-top:8px;
    font-size:14px;
    font-weight:normal;
    opacity:0.8;
}

.divider{
    margin:25px 0;
    border-top:1px solid #00ff66;
}

.section-title{
    font-size:18px;
    margin-bottom:20px;
}

.prompt{
    margin-bottom:15px;
}

.input-line{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    font-size:16px;
}

.prompt-arrow{
    margin-right:10px;
}

#typedText{
    white-space:pre;
}

#cursor{
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

button{
    margin-top:20px;
    background:black;
    border:1px solid #00ff66;
    color:#00ff66;
    font-family:monospace;
    padding:8px 14px;
    cursor:pointer;
}

button:hover{
    background:#001a00;
}

#result{
    margin-top:25px;
    white-space:pre-line;
}

.scanline{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.02),
            rgba(255,255,255,0.02) 1px,
            transparent 1px,
            transparent 4px
        );
}

</style>
</head>
<body>

<div id="terminal">

    <div class="header-container">

        <img src="logo.png" class="logo" alt="SIU Logo">

        <div class="header">
            <h1>SPECIAL INVESTIGATIONS UNIT</h1>
            <h2>CASE FILE TERMINAL</h2>
        </div>

    </div>

    <div class="divider"></div>

    <div class="section-title">
        RECOVERED NOTES
    </div>

    <div class="prompt">
        Enter a name, place, or symbol.
    </div>

    <div class="input-line">
        <span class="prompt-arrow">></span>
        <span id="typedText"></span>
        <span id="cursor">█</span>
    </div>

    <button onclick="searchFile()">SUBMIT</button>

    <div id="result"></div>

</div>

<div class="scanline"></div>

<script>

let currentText = "";

const typedText = document.getElementById("typedText");
const result = document.getElementById("result");

function searchFile(){

    const query = currentText.trim().toLowerCase();

    if(query === "monkey"){

        result.innerHTML =
`DESIGNATION: MONKEY

STATUS: UNOBSERVED

NOTES:
To be is to be seen.`;

    } else {

        result.innerHTML = "FILE NOT FOUND";

    }

    currentText = "";
    typedText.textContent = "";
}

document.addEventListener("keydown", function(e){

    if(e.key === "Backspace"){

        e.preventDefault();

        currentText = currentText.slice(0,-1);
        typedText.textContent = currentText;

        return;
    }

    if(e.key === "Enter"){

        e.preventDefault();
        searchFile();
        return;
    }

    if(e.key.length === 1){

        currentText += e.key;
        typedText.textContent = currentText;

    }

});

</script>

</body>
</html>
